apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-trace-app
  namespace: test
  labels:
    app: test-trace-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-trace-app
  template:
    metadata:
      labels:
        app: test-trace-app
      annotations:
        # Pyroscope profiling
        pyroscope.io/scrape: "true"
        pyroscope.io/application-name: "test-trace-app"
    spec:
      containers:
      - name: test-trace-app
        image: ghcr.io/tsolmonbaatarg/test-trace-app:latest
        ports:
        - containerPort: 3000
        env:
        # OTel → SigNoz (Developer)
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-signoz-opentelemetry-collector-agent.monitoring.svc.cluster.local:4317"
        - name: OTEL_SERVICE_NAME
          value: "test-trace-app"
        - name: OTEL_SERVICE_VERSION
          value: "1.0.0"
        - name: NODE_ENV
          value: "production"
      
        # K8s metadata
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
  
          
          
          
---
apiVersion: v1
kind: Service
metadata:
  name: test-trace-app
  namespace: test
spec:
  selector:
    app: test-trace-app
  ports:
  - port: 80
    targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-trace-app
  namespace: test
spec:
  parentRefs:
  - name: qpay-gateway
    namespace: kong
  hostnames:
  - "demo.qpay.mn"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: test-trace-app
      port: 80
